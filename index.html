<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MRH Executive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a2342;--gold:#c4a46b;--bg:#f6f7f9;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:#111}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{margin:0;font-size:22px;color:var(--navy)}h1 span{color:var(--gold);margin-left:8px;font-weight:600}
.meta{font-size:13px;color:#555;text-align:right}
img.dashboard{width:100%;height:auto;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);border:1px solid var(--line);background:#fff}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:20px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.card h2{margin:0 0 12px;font-size:16px;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
.prose{white-space:pre-wrap;line-height:1.6;font-size:15px;color:#1f2937}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MICHELLE REGINATA HOLDINGS LTD <span>| EXECUTIVE DASHBOARD</span></h1>
    <div class="meta">Prepared by KJ | COO<br><span id="date"></span></div>
  </header>

  <!-- YOUR IMAGE GOES HERE -->
  <img src="dashboard.png" alt="Dashboard" class="dashboard" onerror="this.style.display='none'">

  <div class="card">
    <h2>Executive Observations</h2>
    <div class="prose" id="obs">Loading…</div>
  </div>
</div>

<script>
// Loads observations from content/observations.txt
fetch('content/observations.txt?v='+Date.now())
 .then(r=>r.ok?r.text():'Add your observations in content/observations.txt')
 .then(t=>document.getElementById('obs').textContent=t);

document.getElementById('date').textContent = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
</script>
</body>
</html>
